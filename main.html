<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Issues Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['DM Sans', 'sans-serif'] } } }
    }
  </script>
  <style>
    .card-open  { border-top: 3px solid #22c55e; }
    .card-closed{ border-top: 3px solid #a855f7; }
    .spinner {
      border: 3px solid #e5e7eb;
      border-top-color: #6366f1;
      border-radius: 50%;
      width: 36px; height: 36px;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tab-active { background: #6366f1; color: #fff; }
    .tab-inactive { background: transparent; color: #6b7280; }
    .modal-backdrop { background: rgba(0,0,0,0.45); }
  </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

  <!-- NAVBAR -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between">
      <!-- Logo / Name -->
      <div class="flex items-center gap-2">
        <img src="../assets/github-logo.png" alt="GitHub" class="w-7 h-7 rounded-full object-cover">
        <span class="font-bold text-gray-800 text-sm sm:text-base">GitHub Issues Tracker</span>
      </div>
      <!-- Search + Button -->
      <div class="flex items-center gap-2">
        <div class="relative hidden sm:block">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
          </svg>
          <input id="searchInput" type="text" placeholder="Search issues..." class="pl-9 pr-4 py-1.5 border border-gray-200 rounded-lg text-sm outline-none focus:border-indigo-400 w-52 transition-all"/>
        </div>
        <button onclick="doSearch()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-3 py-1.5 rounded-lg transition-colors hidden sm:block">
          + New Issue
        </button>
        <!-- Mobile search icon -->
        <button class="sm:hidden p-1" onclick="toggleMobileSearch()">
          <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
          </svg>
        </button>
      </div>
    </div>
    <!-- Mobile search bar -->
    <div id="mobileSearch" class="hidden sm:hidden px-4 pb-3">
      <div class="flex gap-2">
        <input id="mobileSearchInput" type="text" placeholder="Search issues..." class="flex-1 pl-4 pr-4 py-2 border border-gray-200 rounded-lg text-sm outline-none focus:border-indigo-400"/>
        <button onclick="doSearch()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-3 py-2 rounded-lg transition-colors">+ New Issue</button>
      </div>
    </div>
  </nav>




  </body>
</html>
