<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Issues Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['DM Sans', 'sans-serif'] } } }
    }
  </script>
  <style>
    .card-open  { border-top: 3px solid #22c55e; }
    .card-closed{ border-top: 3px solid #a855f7; }
    .spinner {
      border: 3px solid #e5e7eb;
      border-top-color: #6366f1;
      border-radius: 50%;
      width: 36px; height: 36px;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tab-active { background: #6366f1; color: #fff; }
    .tab-inactive { background: transparent; color: #6b7280; }
    .modal-backdrop { background: rgba(0,0,0,0.45); }
  </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

  <!-- NAVBAR -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between">
      <!-- Logo / Name -->
      <div class="flex items-center gap-2">
        <img src="../assets/github-logo.png" alt="GitHub" class="w-7 h-7 rounded-full object-cover">
        <span class="font-bold text-gray-800 text-sm sm:text-base">GitHub Issues Tracker</span>
      </div>
      <!-- Search + Button -->
      <div class="flex items-center gap-2">
        <div class="relative hidden sm:block">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
          </svg>
          <input id="searchInput" type="text" placeholder="Search issues..." class="pl-9 pr-4 py-1.5 border border-gray-200 rounded-lg text-sm outline-none focus:border-indigo-400 w-52 transition-all"/>
        </div>
        <button onclick="doSearch()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-3 py-1.5 rounded-lg transition-colors hidden sm:block">
          + New Issue
        </button>
        <!-- Mobile search icon -->
        <button class="sm:hidden p-1" onclick="toggleMobileSearch()">
          <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
          </svg>
        </button>
      </div>
    </div>
    <!-- Mobile search bar -->
    <div id="mobileSearch" class="hidden sm:hidden px-4 pb-3">
      <div class="flex gap-2">
        <input id="mobileSearchInput" type="text" placeholder="Search issues..." class="flex-1 pl-4 pr-4 py-2 border border-gray-200 rounded-lg text-sm outline-none focus:border-indigo-400"/>
        <button onclick="doSearch()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-3 py-2 rounded-lg transition-colors">+ New Issue</button>
      </div>
    </div>
  </nav>


<!-- MAIN CONTENT -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">

    <!-- TABS -->
    <div class="bg-white rounded-xl border border-gray-200 mb-6 overflow-hidden">
      <!-- Tab buttons -->
      <div class="flex items-center gap-1 px-4 pt-4 pb-3 border-b border-gray-100">
        <button id="tab-all" onclick="setTab('all')" class="tab-active px-5 py-1.5 rounded-lg text-sm font-semibold transition-all">All</button>
        <button id="tab-open" onclick="setTab('open')" class="tab-inactive px-5 py-1.5 rounded-lg text-sm font-semibold transition-all">Open</button>
        <button id="tab-closed" onclick="setTab('closed')" class="tab-inactive px-5 py-1.5 rounded-lg text-sm font-semibold transition-all">Closed</button>
      </div>

<!-- Issues meta row -->
<div class="flex items-center justify-between px-5 py-3">

  <!-- Left side -->
  <div class="flex items-center gap-3">

    <!-- Circle Image -->
    <div class="p-1 rounded-full shadow-[0_0_10px_2px_rgba(59,130,246,0.7)]">
      <img src="assets/Aperture.png"
           alt="Aperture"
           class="w-5 h-5 object-cover rounded-full">
    </div>

    <!-- Issues Text -->
    <div>
      <span id="issueCount" class="font-bold text-gray-800 text-base">0 Issues</span>
      <p class="text-xs text-gray-400">Track and manage your product issues</p>
    </div>

  </div>

  <!-- Right side status -->
  <div class="flex items-center gap-3 text-sm">
    <span class="flex items-center gap-1.5 text-gray-500">
      <span class="w-2.5 h-2.5 rounded-full bg-green-500 inline-block"></span> Open
    </span>
    <span class="flex items-center gap-1.5 text-gray-500">
      <span class="w-2.5 h-2.5 rounded-full bg-purple-500 inline-block"></span> Closed
    </span>
  </div>

</div>

    <!-- SPINNER -->
    <div id="spinner" class="flex justify-center py-16 hidden">
      <div class="spinner"></div>
    </div>

    <!-- CARDS GRID -->
    <div id="cardsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 hidden"></div>

  </body>
</html>
