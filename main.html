<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Issues Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['DM Sans', 'sans-serif'] } } }
    }
  </script>
  <style>
    .spinner {
      border: 3px solid #e5e7eb;
      border-top-color: #6366f1;
      border-radius: 50%;
      width: 36px; height: 36px;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tab-active { background: #6366f1; color: #fff; }
    .tab-inactive { background: transparent; color: #6b7280; }
    .modal-backdrop { background: rgba(0,0,0,0.45); }
  </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen">

  <!-- NAVBAR -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <img src="../assets/github-logo.png" alt="GitHub" class="w-7 h-7 rounded-full object-cover">
        <span class="font-bold text-gray-800 text-sm sm:text-base">GitHub Issues Tracker</span>
      </div>
      <div class="flex items-center gap-2">
        <div class="relative hidden sm:block">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
          </svg>
          <input id="searchInput" type="text" placeholder="Search issues..." class="pl-9 pr-4 py-1.5 border border-gray-200 rounded-lg text-sm outline-none focus:border-indigo-400 w-52 transition-all"/>
        </div>
        <button onclick="doSearch()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-3 py-1.5 rounded-lg transition-colors hidden sm:block">
          + New Issue
        </button>
        <button class="sm:hidden p-1" onclick="toggleMobileSearch()">
          <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
          </svg>
        </button>
      </div>
    </div>
    <div id="mobileSearch" class="hidden sm:hidden px-4 pb-3">
      <div class="flex gap-2">
        <input id="mobileSearchInput" type="text" placeholder="Search issues..." class="flex-1 pl-4 pr-4 py-2 border border-gray-200 rounded-lg text-sm outline-none focus:border-indigo-400"/>
        <button onclick="doSearch()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-3 py-2 rounded-lg transition-colors">+ New Issue</button>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">

    <!-- TABS -->
    <div class="bg-white rounded-xl border border-gray-200 mb-6 overflow-hidden">
      <div class="flex items-center gap-1 px-4 pt-4 pb-3 border-b border-gray-100">
        <button id="tab-all" onclick="setTab('all')" onmouseenter="previewTab('all')" onmouseleave="revertTab()" class="tab-active px-5 py-1.5 rounded-lg text-sm font-semibold transition-all">All</button>
        <button id="tab-open" onclick="setTab('open')" onmouseenter="previewTab('open')" onmouseleave="revertTab()" class="tab-inactive px-5 py-1.5 rounded-lg text-sm font-semibold transition-all">Open</button>
        <button id="tab-closed" onclick="setTab('closed')" onmouseenter="previewTab('closed')" onmouseleave="revertTab()" class="tab-inactive px-5 py-1.5 rounded-lg text-sm font-semibold transition-all">Closed</button>
      </div>

      <div class="flex items-center justify-between px-5 py-3">
        <div class="flex items-center gap-3">
          <div class="p-1 rounded-full shadow-[0_0_10px_2px_rgba(59,130,246,0.7)]">
            <img src="assets/Aperture.png" alt="Aperture" class="w-5 h-5 object-cover rounded-full">
          </div>
          <div>
            <span id="issueCount" class="font-bold text-gray-800 text-base">0 Issues</span>
            <p class="text-xs text-gray-400">Track and manage your product issues</p>
          </div>
        </div>
        <div class="flex items-center gap-3 text-sm">
          <span class="flex items-center gap-1.5 text-gray-500">
            <span class="w-2.5 h-2.5 rounded-full bg-green-500 inline-block"></span>
            <span id="openCount">0</span> Open
          </span>
          <span class="flex items-center gap-1.5 text-gray-500">
            <span class="w-2.5 h-2.5 rounded-full bg-purple-500 inline-block"></span>
            <span id="closedCount">0</span> Closed
          </span>
        </div>
      </div>

      <!-- SPINNER -->
      <div id="spinner" class="flex justify-center py-16 hidden">
        <div class="spinner"></div>
      </div>

      <!-- CARDS GRID -->
      <div id="cardsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 p-4 hidden"></div>

      <!-- EMPTY STATE -->
      <div id="emptyState" class="hidden text-center py-20 text-gray-400">
        <svg class="w-12 h-12 mx-auto mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <p class="text-lg font-semibold">No issues found</p>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-backdrop px-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6 relative">
      <div id="modalContent"></div>
      <div class="mt-6 flex justify-end">
        <button onclick="closeModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-7 py-2.5 rounded-xl transition-colors">
          Close
        </button>
      </div>
    </div>
  </div>

<script>
  const API_ALL    = 'https://phi-lab-server.vercel.app/api/v1/lab/issues';
  const API_SEARCH = 'https://phi-lab-server.vercel.app/api/v1/lab/issues/search?q=';
  const API_SINGLE = 'https://phi-lab-server.vercel.app/api/v1/lab/issue/';

  let allIssues = [];
  let currentTab = 'all';
  let oldTab = '';
  let isPreview = false;

  const labelStyle = {
    'bug':             'bg-red-200 text-red-500 border border-red-200',
    'enhancement':     'bg-green-200 text-green-600 border border-green-200',
    'help wanted':     'bg-yellow-200 text-yellow-600 border border-yellow-200',
    'documentation':   'bg-blue-200 text-blue-500 border border-blue-200',
    'good first issue':'bg-green-100 text-green-600 border border-green-200',
  };
  const labelIcon = {
    'bug': '⚠️', 'enhancement': '✨', 'help wanted': '🛠️',
    'documentation': '📄', 'good first issue': '🌱',
  };

  const priorityStyle = {
    'high':   { border: 'bg-red-50 text-red-500 border border-red-200',      bg: 'bg-red-500 text-white' },
    'medium': { border: 'bg-yellow-50 text-yellow-600 border border-yellow-200', bg: 'bg-yellow-400 text-white' },
    'low':    { border: 'bg-gray-100 text-gray-500 border border-gray-200',   bg: 'bg-gray-400 text-white' },
  };

  if (!localStorage.getItem('loggedIn')) {
    window.location.href = 'login.html';
  }

  async function fetchIssues() {
    showSpinner(true);
    try {
      const res  = await fetch(API_ALL);
      if (!res.ok) throw new Error('API error');
      const json = await res.json();
      allIssues  = json.data || [];
    } catch (e) {
      console.error('Failed to fetch issues:', e);
      allIssues = [];
      alert('Failed to load issues. Please check your connection.');
    }
    updateMarkers();
    setTab(currentTab);
    showSpinner(false);
  }

  function updateMarkers() {
    const openNum   = allIssues.filter(i => i.status.toLowerCase() === 'open').length;
    const closedNum = allIssues.filter(i => i.status.toLowerCase() === 'closed').length;
    document.getElementById('openCount').innerText   = openNum;
    document.getElementById('closedCount').innerText = closedNum;
  }

  function setTab(tab) {
    currentTab = tab;
    isPreview  = false;
    ['all','open','closed'].forEach(t => {
      const el = document.getElementById('tab-' + t);
      el.className = t === tab
        ? 'tab-active px-5 py-1.5 rounded-lg text-sm font-semibold transition-all'
        : 'tab-inactive px-5 py-1.5 rounded-lg text-sm font-semibold transition-all';
    });
    const filtered = tab === 'all' ? allIssues : allIssues.filter(i => i.status.toLowerCase() === tab);
    renderCards(filtered);
  }

  function previewTab(tab) {
    if (currentTab !== tab && !isPreview) {
      oldTab = currentTab;
      setTab(tab);
      isPreview = true;
    }
  }

  function revertTab() {
    if (isPreview) {
      setTab(oldTab);
      isPreview = false;
    }
  }

  function renderCards(issues) {
    const grid  = document.getElementById('cardsGrid');
    const empty = document.getElementById('emptyState');
    const count = document.getElementById('issueCount');

    let countText = `${issues.length} ${issues.length === 1 ? 'Issue' : 'Issues'}`;
    if (currentTab === 'open')   countText = `${issues.length} Open`;
    if (currentTab === 'closed') countText = `${issues.length} Closed`;
    count.textContent = countText;

    if (!issues.length) {
      grid.classList.add('hidden');
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');
    grid.classList.remove('hidden');
    grid.innerHTML = issues.map(issue => cardHTML(issue)).join('');
  }

  function cardHTML(issue) {
    const isOpen   = issue.status.toLowerCase() === 'open';

    
    const border   = isOpen ? 'border-t-4 border-t-green-500' : 'border-t-4 border-t-purple-500';

    const iconBg   = isOpen ? 'bg-green-100' : 'bg-purple-100';
    const iconColor= isOpen ? 'text-green-500' : 'text-purple-500';
    const desc     = issue.description.length > 70 ? issue.description.slice(0, 70) + '...' : issue.description;
    const date     = new Date(issue.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const priority = (issue.priority || 'low').toLowerCase();
    const pStyle   = priorityStyle[priority]?.border || priorityStyle['low'].border;

    const labels = (issue.labels || []).map(l => {
      const labelKey = l.toLowerCase();
      return `<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-semibold ${labelStyle[labelKey] || 'bg-gray-100 text-gray-500'}">
        ${labelIcon[labelKey] || ''} ${l.toUpperCase()}
      </span>`;
    }).join('');

    return `
    <div onclick="openModal(${issue.id})"
         class="${border} bg-white rounded-xl border border-gray-200 cursor-pointer hover:shadow-md transition-shadow overflow-hidden flex flex-col">
      <div class="p-4 flex-1">
        <div class="flex items-start justify-between mb-3">
          <div class="${iconBg} ${iconColor} w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0">
            ${isOpen
              ? '<img src="../assets/Open-Status.png" class="w-8 h-8 object-cover" alt="Open">'
              : '<img src="../assets/Closed-Status.png" class="w-8 h-8 object-cover" alt="Closed">'}
          </div>
          <span class="text-xs font-bold px-3 py-1 rounded-full ${pStyle}">${priority.toUpperCase()}</span>
        </div>
        <h3 class="font-bold text-gray-800 text-sm leading-snug mb-1.5 capitalize">${issue.title}</h3>
        <p class="text-gray-400 text-xs leading-relaxed mb-3">${desc}</p>
        <div class="flex flex-wrap gap-1.5">${labels}</div>
      </div>
      <div class="border-t border-gray-100 px-4 py-2.5">
        <p class="text-xs text-gray-400">#${issue.id} by ${issue.author}</p>
        <p class="text-xs text-gray-400 mt-0.5">${date}</p>
      </div>
    </div>`;
  }

  async function openModal(id) {
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('modalContent').innerHTML = `<div class="flex justify-center py-8"><div class="spinner"></div></div>`;

    let issue;
    try {
      const res  = await fetch(API_SINGLE + id);
      if (!res.ok) throw new Error('API error');
      const json = await res.json();
      issue = json.data;
    } catch(e) {
      console.error('Failed to fetch issue:', e);
      issue = allIssues.find(i => i.id === id);
    }

    if (!issue) {
      document.getElementById('modalContent').innerHTML = '<p class="text-center text-red-500">Issue not found.</p>';
      return;
    }

    const isOpen    = issue.status.toLowerCase() === 'open';
    const statusCls = isOpen ? 'bg-green-500 text-white' : 'bg-purple-500 text-white';
    const statusTxt = isOpen ? 'Opened' : 'Closed';
    const date      = new Date(issue.createdAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    const priority  = (issue.priority || 'low').toLowerCase();
    const pStyle    = priorityStyle[priority]?.bg || priorityStyle['low'].bg;

    const labels = (issue.labels || []).map(l => {
      const labelKey = l.toLowerCase();
      return `<span class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-semibold ${labelStyle[labelKey] || 'bg-gray-100 text-gray-500'}">
        ${labelIcon[labelKey] || ''} ${l.toUpperCase()}
      </span>`;
    }).join('');

    document.getElementById('modalContent').innerHTML = `
      <h2 class="text-xl font-bold text-gray-800 mb-3">${issue.title}</h2>
      <div class="flex items-center flex-wrap gap-2 mb-4">
        <span class="px-3 py-1 rounded-full text-xs font-bold ${statusCls}">${statusTxt}</span>
        <span class="text-gray-400 text-xs">•</span>
        <span class="text-gray-500 text-xs">Opened by ${issue.author}</span>
        <span class="text-gray-400 text-xs">•</span>
        <span class="text-gray-500 text-xs">${date}</span>
      </div>
      <div class="flex flex-wrap gap-2 mb-5">${labels}</div>
      <p class="text-gray-600 text-sm leading-relaxed mb-5">${issue.description}</p>
      <div class="bg-gray-50 rounded-xl p-4 grid grid-cols-2 gap-4">
        <div>
          <p class="text-xs text-gray-400 mb-1">Assignee:</p>
          <p class="font-bold text-gray-800 text-sm">${issue.assignee || 'Unassigned'}</p>
        </div>
        <div>
          <p class="text-xs text-gray-400 mb-1">Priority:</p>
          <span class="inline-block px-3 py-1 rounded-full text-xs font-bold ${pStyle}">${priority.toUpperCase()}</span>
        </div>
      </div>`;
  }

  function closeModal() {
    document.getElementById('modal').classList.add('hidden');
  }

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  let searchTimeout;
  function setupSearchListeners() {
    document.getElementById('searchInput').addEventListener('input', debounceSearch);
    document.getElementById('mobileSearchInput').addEventListener('input', debounceSearch);
  }

  function debounceSearch() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => doSearch(), 350);
  }

  async function doSearch() {
    const q = (document.getElementById('searchInput').value || document.getElementById('mobileSearchInput').value).trim();
    if (!q) { setTab(currentTab); return; }
    showSpinner(true);
    try {
      const res  = await fetch(API_SEARCH + encodeURIComponent(q));
      if (!res.ok) throw new Error('API error');
      const json = await res.json();
      let results = json.data || [];
      if (currentTab !== 'all') results = results.filter(i => i.status.toLowerCase() === currentTab);
      renderCards(results);
    } catch(e) {
      console.error('Search failed:', e);
      const results = allIssues.filter(i =>
        i.title.toLowerCase().includes(q.toLowerCase()) ||
        i.description.toLowerCase().includes(q.toLowerCase())
      ).filter(i => currentTab === 'all' || i.status.toLowerCase() === currentTab);
      renderCards(results);
    }
    showSpinner(false);
  }

  function showSpinner(show) {
    const spinner = document.getElementById('spinner');
    const grid    = document.getElementById('cardsGrid');
    const empty   = document.getElementById('emptyState');
    spinner.classList.toggle('hidden', !show);
    if (show) {
      grid.classList.add('hidden');
      empty.classList.add('hidden');
    }
  }

  function toggleMobileSearch() {
    document.getElementById('mobileSearch').classList.toggle('hidden');
  }

  setupSearchListeners();
  fetchIssues();
</script>
</body>
</html>
